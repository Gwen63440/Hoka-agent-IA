name: Verification_Hoka_Quotidienne
on:
  schedule:
    - cron: '0 7 * * *' # S'exécute automatiquement TOUS LES JOURS à 7h00 du matin
  workflow_dispatch: # Permet aussi de le lancer à la main si vous voulez tester

jobs:
  execution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-genai requests beautifulsoup4
      - name: Lancer le script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python agent.py
